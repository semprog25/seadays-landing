<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://auth.seadays.app/storage/v1/object/public/SeadaysPublic/seadaysfav.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Port Site Story - SeaDays Blog">
    <meta property="og:title" content="Port Site Story | SeaDays">
    <meta property="og:description" content="Read this story from the SeaDays cruise community.">
    <meta property="og:type" content="article">
    <meta property="article:author" content="">
    <meta property="article:published_time" content="">
    <link rel="canonical" href="">
    <title>Loading... | SeaDays Blog</title>
    <script src="seo-inject.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --dark-bg: #0a0a0a;
            --dark-bg-alt: #1a1a1a;
            --neon-red: #FF0033;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: var(--dark-bg);
            color: white;
            line-height: 1.7;
        }
        .starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%);
            overflow: hidden;
        }
        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        .grid-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background-image:
                linear-gradient(rgba(255,0,51,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,0,51,0.02) 1px, transparent 1px);
            background-size: 100px 100px;
            opacity: 0.4;
            pointer-events: none;
        }
        .content-layer { position: relative; z-index: 10; }
        .header {
            position: sticky;
            top: 0;
            padding: 16px 24px;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 50;
        }
        .header-nav {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
            align-items: center;
        }
        .header-nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
        }
        .header-nav a:hover { color: white; }
        .article-wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px 120px;
        }
        .article-hero-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 32px;
        }
        .article-hero-placeholder {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, rgba(255,0,51,0.15), rgba(6,182,212,0.15));
            border-radius: 16px;
            margin-bottom: 32px;
        }
        .article-title {
            font-size: 42px;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
        }
        .article-meta .author { color: rgba(255,255,255,0.8); }
        .article-content {
            font-size: 18px;
            color: rgba(255,255,255,0.9);
        }
        /* Force readable text on dark background – overrides inline styles from CMS/pasted content */
        .article-content,
        .article-content p,
        .article-content li,
        .article-content span,
        .article-content div {
            color: rgba(255,255,255,0.9) !important;
        }
        .article-content h1,
        .article-content h2,
        .article-content h3,
        .article-content h4,
        .article-content h5,
        .article-content h6 {
            color: #ffffff !important;
        }
        .article-content a {
            color: var(--neon-red) !important;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .article-content a:hover {
            color: #ff3366 !important;
            text-decoration: underline;
        }
        .article-content a:visited {
            color: rgba(255, 0, 51, 0.9) !important;
        }
        .article-content h2 { font-size: 28px; margin: 40px 0 16px; }
        .article-content h3 { font-size: 22px; margin: 32px 0 12px; }
        .article-content p { margin-bottom: 20px; }
        .article-content ul, .article-content ol { margin: 20px 0 20px 24px; }
        .article-content li { margin-bottom: 8px; }
        .article-content img { max-width: 100%; height: auto; border-radius: 8px; }
        .article-content blockquote {
            border-left: 4px solid var(--neon-red);
            padding-left: 20px;
            margin: 24px 0;
            color: rgba(255,255,255,0.7) !important;
        }
        .article-content strong, .article-content b { color: rgba(255,255,255,0.95) !important; }
        .article-content code, .article-content pre {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.95) !important;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .article-content pre { padding: 16px; overflow-x: auto; display: block; }
        .loading { text-align: center; padding: 80px 24px; color: rgba(255,255,255,0.6); }
        .error { text-align: center; padding: 80px 24px; color: #ff6b6b; }
        .article-cta {
            margin-top: 48px;
            padding: 32px;
            background: linear-gradient(135deg, rgba(255,0,51,0.12), rgba(6,182,212,0.08));
            border: 2px solid rgba(255,0,51,0.3);
            border-radius: 16px;
            text-align: center;
        }
        .article-cta h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            color: white;
        }
        .article-cta p {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 20px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
        .article-cta .cta-btn {
            display: inline-block;
            padding: 14px 28px;
            background: var(--neon-red);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            border-radius: 25px;
            transition: all 0.2s ease;
        }
        .article-cta .cta-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255,0,51,0.4);
        }
        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: var(--neon-red);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }
        @media (max-width: 768px) {
            .article-title { font-size: 28px; }
            .article-content { font-size: 16px; }
            .article-cta { padding: 24px 20px; }
            .article-cta h3 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="starfield" id="starfield"></div>
    <div class="grid-overlay"></div>
    <div class="content-layer">
        <header class="header">
            <nav class="header-nav">
                <a href="index.html">Home</a>
                <a href="blog.html">Blog</a>
                <a href="https://seadays.app/privacy.html">Privacy</a>
                <a href="https://seadays.app/terms.html">Terms</a>
            </nav>
        </header>

        <main id="articleMain" class="article-wrap">
            <div id="articleLoading" class="loading">Loading article...</div>
            <div id="articleError" class="error" style="display:none;">
                Article not found. <a href="blog.html" class="back-link">Back to Blog</a>
            </div>
            <article id="articleContent" style="display:none;"></article>
        </main>
    </div>

    <script>
        (function() {
            const projectId = 'soqkgrfzluewpuiguypm';
            const publicAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvcWtncmZ6bHVld3B1aWd1eXBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2MjM3MDMsImV4cCI6MjA3NzE5OTcwM30.PJOgXC4sXdjcGuQ99uw38eXwD9Jss-6tggHeUemXqZI';
            const API = 'https://' + projectId + '.supabase.co/functions/v1/make-server-51d3ca8d';

            function getParam(name) {
                const u = new URL(window.location.href);
                return u.searchParams.get(name);
            }

            function createStarfield() {
                const sf = document.getElementById('starfield');
                for (let i = 0; i < 100; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDelay = Math.random() * 3 + 's';
                    sf.appendChild(star);
                }
            }
            createStarfield();

            function setMeta(nameOrProp, content, isProp) {
                const attr = isProp ? 'property' : 'name';
                let el = document.querySelector('meta[' + attr + '="' + nameOrProp + '"]');
                if (!el) {
                    el = document.createElement('meta');
                    el.setAttribute(attr, nameOrProp);
                    document.head.appendChild(el);
                }
                el.setAttribute('content', content || '');
            }

            function formatDate(ts) {
                if (!ts) return '';
                var d = new Date(typeof ts === 'number' ? ts : ts);
                return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            }

            function sanitizeHtml(html) {
                if (!html) return '';
                var d = document.createElement('div');
                d.innerHTML = html;
                var scripts = d.querySelectorAll('script');
                scripts.forEach(function(s) { s.remove(); });
                return d.innerHTML;
            }

            function resolveArticleId() {
                var id = getParam('id');
                var slug = getParam('slug');
                if (id) return id;
                if (slug) {
                    return null;
                }
                return null;
            }

            async function loadArticle() {
                var articleId = resolveArticleId();
                if (!articleId) {
                    document.getElementById('articleLoading').style.display = 'none';
                    document.getElementById('articleError').style.display = 'block';
                    return;
                }

                try {
                    var res = await fetch(API + '/portside-articles/' + encodeURIComponent(articleId), {
                        headers: { 'Authorization': 'Bearer ' + publicAnonKey }
                    });
                    var data = await res.json();
                    document.getElementById('articleLoading').style.display = 'none';

                    if (!res.ok || data.error) {
                        document.getElementById('articleError').style.display = 'block';
                        return;
                    }

                    var a = data.article ?? data;
                    var fullUrl = window.location.href;

                    var seo = {};
                    try {
                        var seoRes = await fetch(API + '/portside-articles/' + encodeURIComponent(articleId) + '/seo', {
                            headers: { 'Authorization': 'Bearer ' + publicAnonKey }
                        });
                        var seoData = await seoRes.json();
                        if (seoData.success && seoData.seo) seo = seoData.seo;
                    } catch (e) {}

                    var metaTitle = seo.metaTitle || a.title || 'Untitled';
                    var metaDesc = seo.metaDescription || a.metaDescription || a.excerpt || (a.content ? a.content.substring(0, 160) : '');
                    var metaAuthor = seo.articleAuthor || a.author || '';
                    var metaPubTime = seo.articlePublishedTime || a.publishedAt || (a.timestamp ? new Date(a.timestamp).toISOString() : '');
                    var metaOgImage = seo.ogImage || a.ogImage || a.heroImageUrl || a.thumbnailUrl;
                    var metaCanonical = seo.canonicalUrl || a.canonicalUrl || fullUrl;

                    document.title = metaTitle + (metaTitle.indexOf('|') >= 0 ? '' : ' | SeaDays Blog');
                    setMeta('description', metaDesc, false);
                    setMeta('og:title', metaTitle, true);
                    setMeta('og:description', metaDesc, true);
                    setMeta('og:url', fullUrl, true);
                    setMeta('og:type', 'article', true);
                    setMeta('article:author', metaAuthor, true);
                    setMeta('article:published_time', metaPubTime, true);
                    if (metaOgImage) setMeta('og:image', metaOgImage, true);
                    if (seo.robots) setMeta('robots', seo.robots, false);
                    if (seo.maxImagePreview) setMeta('max-image-preview', seo.maxImagePreview, false);
                    var canonicalEl = document.querySelector('link[rel="canonical"]');
                    if (canonicalEl) canonicalEl.href = metaCanonical;

                    var html = '';
                    if (a.heroImageUrl || a.thumbnailUrl) {
                        html += '<img src="' + (a.heroImageUrl || a.thumbnailUrl).replace(/"/g, '&quot;') + '" alt="" class="article-hero-img">';
                    } else {
                        html += '<div class="article-hero-placeholder"></div>';
                    }
                    html += '<h1 class="article-title">' + (a.title || 'Untitled').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</h1>';
                    html += '<div class="article-meta">';
                    html += '<span class="author">' + (a.author || 'Anonymous').replace(/</g, '&lt;') + '</span>';
                    html += '<span>' + formatDate(a.publishedAt || a.timestamp || a.updatedAt) + '</span>';
                    if (a.readTime) html += '<span>' + a.readTime + ' min read</span>';
                    html += '</div>';
                    html += '<div class="article-content">' + sanitizeHtml(a.content || '') + '</div>';
                    html += '<div class="article-cta">';
                    html += '<h3>Plan your next cruise with SeaDays</h3>';
                    html += '<p>Track your voyages, discover ports, and connect with fellow cruisers. Download the free SeaDays app and start your maritime adventure.</p>';
                    html += '<a href="index.html#download" class="cta-btn">Download SeaDays</a>';
                    html += '</div>';

                    var articleEl = document.getElementById('articleContent');
                    articleEl.innerHTML = html + '<a href="blog.html" class="back-link">&larr; Back to Blog</a>';
                    articleEl.style.display = 'block';
                } catch (e) {
                    document.getElementById('articleLoading').style.display = 'none';
                    document.getElementById('articleError').style.display = 'block';
                }
            }

            loadArticle();
        })();
    </script>
</body>
</html>
