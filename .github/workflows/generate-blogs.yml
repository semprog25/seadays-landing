name: Generate Static Blogs

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate blog pages and sitemap
        run: node scripts/generate-blog-pages.js

      - name: Check for changes
        id: changes
        run: |
          if [ -f .blog-pages-manifest.json ]; then
            git diff --quiet -- blog/ sitemap.xml .blog-pages-manifest.json || echo "changed=true" >> $GITHUB_OUTPUT
          else
            git diff --quiet -- blog/ sitemap.xml || echo "changed=true" >> $GITHUB_OUTPUT
          fi
          git status --short

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # blog/ includes new dirs (blog/{slug}/) and redirect files (blog/{slug}.html)
          git add blog/ sitemap.xml
          if [ -f .blog-pages-manifest.json ]; then
            git add .blog-pages-manifest.json
          fi
          git commit -m "chore: regenerate static blog pages and sitemap [skip ci]"
          git push
