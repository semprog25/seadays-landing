name: Generate Static Blogs

on:
  push:
    branches: [main]
    paths:
      - 'scripts/generateBlogs.js'
      - '.github/workflows/generate-blogs.yml'
  workflow_dispatch:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate static blogs
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run generate-blogs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet blog/ sitemap.xml || echo "changed=true" >> $GITHUB_OUTPUT
          git status --short

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ sitemap.xml
          git commit -m "chore: regenerate static blog pages and sitemap [skip ci]"
          git push
