<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SeaDays</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-teal: #0077be;
            --teal-dark: #005a8f;
            --cyan: #06B6D4;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --dark-bg: #0a0a0a;
            --dark-bg-alt: #1a1a1a;
            --neon-red: #FF0033;
            --text-light: #ffffff;
            --text-gray-dark: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: var(--dark-bg);
            color: var(--text-light);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--neon-red);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #ff3366;
            transform: translateX(-5px);
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 48px;
            font-weight: 900;
            color: var(--text-light);
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-gray-dark);
        }

        .form-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px;
        }

        .form-section h2 {
            font-size: 28px;
            color: var(--text-light);
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-light);
            transition: all 0.3s ease;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--neon-red);
            box-shadow: 0 0 0 3px rgba(255, 0, 51, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--neon-red);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: #cc0029;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 51, 0.4);
        }

        .success-message {
            background: rgba(255, 0, 51, 0.2);
            border: 1px solid var(--neon-red);
            color: var(--text-light);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .success-message.error {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
            }

            .form-section {
                padding: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://seadays.app/" class="back-link">← Back to Home</a>
        
        <div class="header">
            <h1>Contact Us</h1>
            <p class="subtitle">We're here to help! Reach out anytime.</p>
        </div>

        <div class="form-section">
            <h2>Send Us a Message</h2>
            
            <div class="success-message" id="successMessage">
                Thanks for reaching out! We'll get back to you soon.
            </div>

            <form id="contactForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject *</label>
                    <select id="subject" name="subject" required>
                        <option value="">Select a topic...</option>
                        <option value="general">General Inquiry</option>
                        <option value="support">Technical Support</option>
                        <option value="billing">Billing & Subscriptions</option>
                        <option value="feature">Feature Request</option>
                        <option value="bug">Bug Report</option>
                        <option value="partnership">Partnership Opportunity</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>

    <script>
        const projectId = 'soqkgrfzluewpuiguypm';
        const publicAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvcWtncmZ6bHVld3B1aWd1eXBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2MjM3MDMsImV4cCI6MjA3NzE5OTcwM30.PJOgXC4sXdjcGuQ99uw38eXwD9Jss-6tggHeUemXqZI';

        async function handleSubmit(event) {
            event.preventDefault();

            const form = document.getElementById('contactForm');
            const submitBtn = form.querySelector('.submit-btn');
            const successMessage = document.getElementById('successMessage');

            const name = form.name.value.trim();
            const email = form.email.value.trim();
            const subject = form.subject.value;
            const message = form.message.value.trim();

            if (!name || !email || !subject || !message) {
                successMessage.textContent = 'Please fill in all fields.';
                successMessage.classList.add('show');
                setTimeout(() => successMessage.classList.remove('show'), 5000);
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const response = await fetch(`https://${projectId}.supabase.co/functions/v1/make-server-51d3ca8d/feedback`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${publicAnonKey}`,
                    },
                    body: JSON.stringify({
                        userId: 'contact-form',
                        userName: name,
                        userEmail: email,
                        feedbackType: 'feedback',
                        subject: form.subject.options[form.subject.selectedIndex].text || subject,
                        message: message,
                        rating: 0,
                    }),
                });

                const data = await response.json();

                if (response.ok && !data.error) {
                    successMessage.textContent = 'Thanks for reaching out! We\'ll get back to you soon.';
                    successMessage.classList.remove('error');
                    successMessage.classList.add('show');
                    form.reset();
                    setTimeout(() => successMessage.classList.remove('show'), 5000);
                } else {
                    throw new Error(data.error || 'Failed to send message');
                }
            } catch (err) {
                successMessage.textContent = err.message || 'Something went wrong. Please try again.';
                successMessage.classList.add('error', 'show');
                setTimeout(() => {
                    successMessage.classList.remove('show', 'error');
                }, 5000);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            }
        }
    </script>
</body>
</html>
